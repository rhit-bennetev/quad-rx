<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Controller Configuration Manager</title>
    <link rel="stylesheet" href="styles.css">
    <script type="text/javascript" src="captivePortalScript.js"></script>
</head>
<body>
    <!-- Navigation -->
    <nav>
        <div class="logo">QuadRX</div>
        <div>
            <button class="dropdown-item disabled" onclick="loadFavorite(0)">Fave1</button>
            <button class="dropdown-item disabled" onclick="loadFavorite(1)">Fave2</button>
            <button class="dropdown-item disabled" onclick="loadFavorite(2)">Fave3</button>
        </div>
        <div class="dropdown">
            <button class="dropdown-btn" onclick="toggleDropdown('dropdownMenu')">Menu</button>
            <div class="dropdown-menu" id="dropdownMenu">
                <div class="dropdown-item" onclick="handleMenuOption('new')">New Configuration</div>
                <div class="dropdown-item" onclick="handleMenuOption('load')">Manage Configurations</div>
                <div class="dropdown-item" onclick="handleMenuOption('save')">Save Configuration</div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="container">
        <h1>Controller Configuration Manager</h1>
        <div class="image-blocks">
            <div class="controller-container">
                <div class="controller-wrapper">
                    <div id="mouthpiece" class="mouthpiece">
                        <div class="sip-puffs">
                            <div id="SP1" class="sp-select" onclick="selectSipPuff('SP1')"></div>
                            <div id="SP2" class="sp-select" onclick="selectSipPuff('SP2')"></div>
                            <div id="SP3" class="sp-select" onclick="selectSipPuff('SP3')"></div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="controller-container">
                <div class="controller-wrapper">
                    <div id="controller" class="controller">
                        <div class="">
                            <!-- Shoulder Buttons -->
                            <div id="LT" class="shoulder-btn lt" onclick="openBindingPopup('LT')">LT</div>
                            <div id="RT" class="shoulder-btn rt" onclick="openBindingPopup('RT')">RT</div>
                            <div id="LB" class="shoulder-btn lb" onclick="openBindingPopup('LB')">LB</div>
                            <div id="RB" class="shoulder-btn rb" onclick="openBindingPopup('RB')">RB</div>

                            <!-- D-Pad -->
                            <div class="dpad">
                                <div id="dpad-up" class="dpad-btn dpad-up" onclick="openBindingPopup('D-Pad Up')"></div>
                                <div id="dpad-down" class="dpad-btn dpad-down" onclick="openBindingPopup('D-Pad Down')"></div>
                                <div id="dpad-left" class="dpad-btn dpad-left" onclick="openBindingPopup('D-Pad Left')"></div>
                                <div id="dpad-right" class="dpad-btn dpad-right" onclick="openBindingPopup('D-Pad Right')"></div>
                            </div>

                            <!-- Face Buttons -->
                            <div class="face-buttons">
                                <div id="face-y" class="face-btn btn-y invis" onclick="openBindingPopup('Y Button')">Y</div>
                                <div id="face-b" class="face-btn btn-b invis" onclick="openBindingPopup('B Button')">B</div>
                                <div id="face-a" class="face-btn btn-a invis" onclick="openBindingPopup('A Button')">A</div>
                                <div id="face-x" class="face-btn btn-x invis" onclick="openBindingPopup('X Button')">X</div>
                            </div>

                            <!-- Center Buttons -->
                            <div class="center-buttons">
                                <div id="face-select" class="center-btn" onclick="openBindingPopup('Select')"></div>
                                <div id="face-start" class="center-btn" onclick="openBindingPopup('Start')"></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="popup" id="bindingbox">
        <div class="popup-content">
            <div class="popup-header" id="popupHeader">Configure Button</div>
            <div class="popup-body">
                <label for="actionInput">Assign Button:</label>
                <select id="actionInput" class="popup-input">
                    <option value="sip">Sip</option>
                    <option value="puff">Puff</option>
                </select>
            </div>
            <div class="popup-buttons">
                <button class="popup-btn popup-btn-secondary" onclick="closePopup('bindingbox')">Cancel</button>
                <button class="popup-btn popup-btn-primary" onclick="saveBinding()">Save</button>
            </div>
        </div>
    </div>
    <div class="popup" id="newConfigPopup">
        <div class="popup-content">
            <div class="popup-header">Console Configuration</div>
            <div class="popup-body">
                <button class="popup-btn" onclick="switchController(this)" data-image="images/switch-controller.png">Switch</button>
                <button class="popup-btn" onclick="switchController(this)" data-image="images/playstation-controller.png">Playstation</button>
                <button class="popup-btn" onclick="switchController(this)" data-image="images/xbox-controller.svg">XBox</button>
            </div>
            <div class="popup-buttons">
                <button class="popup-btn popup-btn-secondary" onclick="closePopup('newConfigPopup')">Cancel</button>
            </div>
        </div>
    </div>
    <div class="popup" id="namingbox">
        <div class="popup-content">
            <div class="popup-header">Name your Controller Profile</div>
            <div class="popup-body">
                <label for="nameInput">Name Configuration:</label>
                <input type="text" id="nameInput" class="modal-input" placeholder="New Configuration">
            </div>
            <div class="popup-buttons">
                <button class="popup-btn popup-btn-secondary" onclick="closePopup('namingbox')">Cancel</button>
                <button class="popup-btn popup-btn-primary" onclick="saveConfiguration()">Save</button>
            </div>
        </div>
    </div>
    <div class="popup" id="profileSelector">
        <div class="popup-content">
            <select class="popup-input" id="profileDropdown">
                <option value="">-- Select Profile --</option>
            </select>
            <div class="popup-buttons">
                <button class="popup-btn popup-btn-secondary" onclick="deleteSelectedProfile()">Delete</button>
                <button class="popup-btn popup-btn-secondary" onclick="loadSelectedProfile()">Load</button>
            </div> 
        </div>
    </div>
</body>
</html>
